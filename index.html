<!doctype html>
<html lang="en">
  <head>
    <script>
      (function() {
        try {
          var originalFetch = window.fetch;
          var currentFetch = originalFetch;
          Object.defineProperty(window, 'fetch', {
            configurable: true,
            enumerable: true,
            get: function() {
              return currentFetch;
            },
            set: function(val) {
              currentFetch = val;
            }
          });
        } catch (e) {
          console.warn("Unable to redefine window.fetch helper:", e);
        }
      })();
    </script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Shop</title>
    <link rel="icon" type="image/x-icon" href="https://www.rantumondal.dev/profile-photo.jpg" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
